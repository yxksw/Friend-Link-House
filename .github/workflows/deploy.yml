name: Deploy
on:
    push:
        branches:
            - main
    schedule:
        - cron: "0 4,16 * * *"
jobs:
    deploy-worker:
        runs-on: ubuntu-latest
        name: Deploy Worker
        if: github.event_name == 'push'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  persist-credentials: false
            - name: Use Node.js 22.x
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
            - name: Deploy Worker to Cloudflare
              run: npx wrangler deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}

    deploy-pages:
        runs-on: ubuntu-latest
        name: Deploy Pages
        if: github.event_name == 'push'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Use Node.js 22.x
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
            - name: Cache node_modules
              uses: actions/cache@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm ci
            - run: npm run gen
            - run: npm run build
            - name: Deploy to Cloudflare Pages
              uses: cloudflare/pages-action@v1
              with:
                  apiToken: ${{ secrets.CF_WORKERS_TOKEN }}
                  accountId: ${{ secrets.CF_ACCOUNT_ID }}
                  projectName: friend-link-house
                  directory: web/dist
                  gitHubToken: ${{ secrets.GITHUB_TOKEN }}

    sync-data:
        runs-on: ubuntu-latest
        name: Sync RSS Data to D1
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Use Node.js 22.x
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
            - name: Cache node_modules
              uses: actions/cache@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - name: Install dependencies
              run: npm ci
            - name: Generate SQL from RSS feeds
              run: node init-d1.js
            - name: Sync data to D1
              run: |
                  # 安装 Wrangler
                  npm install -g wrangler

                  # 同步博客列表
                  if [ -f "d1-init.sql" ]; then
                    echo "Syncing blogs..."
                    wrangler d1 execute friend-link-house-db --file=./d1-init.sql --yes
                  fi

                  # 同步文章数据
                  if [ -f "d1-sync-posts.sql" ]; then
                    echo "Syncing posts..."
                    wrangler d1 execute friend-link-house-db --file=./d1-sync-posts.sql --yes
                  fi
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
