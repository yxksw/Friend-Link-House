name: Deploy
on:
    push:
        branches:
            - main
    schedule:
        - cron: "0 4,16 * * *"
jobs:
    deploy-worker:
        runs-on: ubuntu-latest
        name: Deploy Worker
        if: github.event_name == 'push'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  persist-credentials: false
            - name: Use Node.js 22.x
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
            - name: Deploy Worker to Cloudflare
              run: npx wrangler deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}

    deploy-pages:
        runs-on: ubuntu-latest
        name: Deploy Pages
        if: github.event_name == 'push'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Use Node.js 22.x
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
            - name: Cache node_modules
              uses: actions/cache@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm ci
            - run: npm run gen
            - run: VITE_API_URL=https://links-rss-api.314926.xyz npm run build
            - name: Deploy to Cloudflare Pages
              uses: cloudflare/pages-action@v1
              with:
                  apiToken: ${{ secrets.CF_WORKERS_TOKEN }}
                  accountId: ${{ secrets.CF_ACCOUNT_ID }}
                  projectName: friend-link-house
                  directory: web/dist
                  gitHubToken: ${{ secrets.GITHUB_TOKEN }}

    sync-data:
        runs-on: ubuntu-latest
        name: Sync RSS Data to D1
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Use Node.js 22.x
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
            - name: Cache node_modules
              uses: actions/cache@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - name: Install dependencies
              run: npm ci
            - name: Generate SQL from RSS feeds
              run: node init-d1.js
              timeout-minutes: 10
            - name: Verify SQL files generated
              run: |
                  echo "=== Verifying generated files ==="
                  echo "Current directory: $(pwd)"
                  echo "Files in directory:"
                  ls -lh
                  echo ""
                  echo "Checking d1-*.sql files:"
                  ls -lh d1-*.sql || echo "No d1-*.sql files found!"

                  if [ ! -f "d1-init.sql" ]; then
                    echo "::error::d1-init.sql not found"
                    exit 1
                  fi
                  if [ ! -f "d1-sync-posts.sql" ]; then
                    echo "::error::d1-sync-posts.sql not found"
                    exit 1
                  fi
                  echo "✅ All SQL files verified successfully"
            - name: Sync data to D1
              run: |
                  # 安装 Wrangler
                  npm install -g wrangler

                  # 清理旧数据（避免重复）
                  echo "Cleaning old data..."
                  timeout 60 wrangler d1 execute friend-link-house-db --command="DELETE FROM posts; DELETE FROM blogs;" --remote --yes || echo "Clean completed or timed out"

                  # 同步博客列表（使用 --remote 访问远程数据库）
                  if [ -f "d1-init.sql" ]; then
                    echo "Syncing blogs..."
                    timeout 120 wrangler d1 execute friend-link-house-db --file=./d1-init.sql --remote --yes || echo "Blog sync completed or timed out"
                  fi

                  # 同步文章数据（限制在 120 条以内，避免超时）
                  if [ -f "d1-sync-posts.sql" ]; then
                    echo "Syncing posts..."
                    timeout 180 wrangler d1 execute friend-link-house-db --file=./d1-sync-posts.sql --remote --yes || echo "Posts sync completed or timed out"
                  fi
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
