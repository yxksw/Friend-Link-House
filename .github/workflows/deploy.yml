name: Deploy
on:
    push:
        branches:
            - main
    schedule:
        - cron: "0 4,16 * * *"
jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version:
                    - 22.x
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  persist-credentials: false
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
            - name: Cache node_modules
              uses: actions/cache@v4
              env:
                  cache-name: blogroll-node-modules
              with:
                  path: node_modules
                  key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('package-lock.json') }}
            - name: Cache workers-site/node_modules
              uses: actions/cache@v4
              env:
                  cache-name: workers-site-node-modules
              with:
                  path: workers-site/node_modules
                  key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('workers-site/package-lock.json') }}
            - run: npm i
            - run: cd workers-site && npm i
            - run: npm run gen
            - run: npm run build
            - name: Deploy to Cloudflare Workers
              run: npx wrangler deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
